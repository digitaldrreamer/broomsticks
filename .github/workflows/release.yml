name: release

# Publishes to npm with build provenance whenever a v* tag is pushed, using
# OIDC trusted publishing — no NPM_TOKEN secret required. The package's
# "Trusted Publisher" must be configured on npmjs.com to point at this repo
# and workflow file (release.yml).
#
# Cut a release with:  npm version <patch|minor|major> && git push --follow-tags
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write   # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.13'
          registry-url: 'https://registry.npmjs.org'

      # Gate the publish on a green test run (also enforced by prepublishOnly).
      - run: node --test

      # Guard: the pushed tag must match the package.json version, so a stray
      # tag can never publish the wrong version.
      - name: Verify tag matches package version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$GITHUB_REF_NAME" != "$PKG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $PKG_VERSION" >&2
            exit 1
          fi

      # OIDC trusted publishing needs npm >= 11.5.1; Node 22.13 ships ~10.9.
      - run: npm install -g npm@latest

      # No NODE_AUTH_TOKEN: auth comes from the runner's OIDC identity.
      # Provenance is generated automatically for trusted-publisher releases.
      - run: npm publish --provenance --access public
